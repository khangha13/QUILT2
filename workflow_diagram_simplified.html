<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUILT2 KH Workflow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #f6f3ef;
      color: #202020;
      padding: 32px 18px 48px;
    }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 20px;
      color: #4d4d4d;
      font-size: 15px;
    }
    .panel {
      background: #ffffffaa;
      border: 1px solid #d8d0c8;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      overflow: auto;
      padding: 12px;
    }
    img {
      display: block;
      width: 100%;
      min-width: 1180px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>QUILT2 KH Workflow</h1>
    <div class="panel">
      <img src="./workflow_diagram_simplified.svg" alt="Workflow for the QUILT2 KH pipeline">
    </div>
  </div>
</body>
</html>
